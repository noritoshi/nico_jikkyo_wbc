<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      width: 340px;
      padding: 24px;
      font-family: 'Inter', 'Hiragino Kaku Gothic ProN', sans-serif;
      font-size: 14px;
      background: #0A0F1C;
      color: #eee;
      margin: 0;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .logo-icon {
      font-size: 20px;
    }
    .logo h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      font-weight: 700;
      margin: 0;
      color: #fff;
    }
    .logo .version {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #64748B;
      font-weight: 500;
    }
    .divider {
      border: none;
      height: 1px;
      background: #1E293B;
      margin: 20px 0;
    }
    .section-label {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: #64748B;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .field {
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #94A3B8;
      margin-bottom: 6px;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #1E293B;
      color: #eee;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      box-sizing: border-box;
      outline: none;
      transition: box-shadow 0.2s;
    }
    input[type="text"]::placeholder {
      color: #475569;
    }
    input[type="text"]:focus {
      box-shadow: 0 0 0 2px rgba(233, 69, 96, 0.3);
    }
    .buttons {
      display: flex;
      gap: 10px;
    }
    button {
      flex: 1;
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      transition: background 0.2s, opacity 0.2s;
    }
    #btn-connect {
      background: #E94560;
      color: #fff;
    }
    #btn-connect:hover {
      background: #d13d55;
    }
    #btn-connect:disabled {
      background: #1E293B;
      color: #475569;
      cursor: not-allowed;
    }
    #btn-disconnect {
      background: #1E293B;
      color: #94A3B8;
    }
    #btn-disconnect:hover {
      background: #2a3a52;
    }
    #btn-disconnect:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .status {
      margin-top: 14px;
      padding: 10px;
      border-radius: 8px;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      text-align: center;
    }
    .status.disconnected { background: #0F172A; color: #475569; }
    .status.connecting { background: rgba(255, 204, 0, 0.08); color: #FFCC00; }
    .status.connected { background: rgba(34, 211, 238, 0.08); color: #22D3EE; }
    .status.error { background: rgba(233, 69, 96, 0.08); color: #E94560; }
    #btn-save-key {
      background: #1E293B;
      color: #fff;
    }
    #btn-save-key:hover {
      background: #2a3a52;
    }
    .hint {
      font-size: 11px;
      color: #64748B;
      margin-top: 6px;
    }
    .hint a {
      color: #E94560;
      text-decoration: none;
    }
    .hint a:hover {
      text-decoration: underline;
    }
    #key-status,
    #dg-key-status,
    #keyterm-status {
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      color: #22D3EE;
      margin-top: 6px;
      text-align: center;
    }
    #btn-save-dg-key,
    #btn-fetch-keyterms,
    #btn-add-keyterm {
      background: #1E293B;
      color: #fff;
    }
    #btn-save-dg-key:hover,
    #btn-fetch-keyterms:hover,
    #btn-add-keyterm:hover {
      background: #2a3a52;
    }
    #btn-fetch-keyterms:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    #btn-clear-keyterms {
      background: transparent;
      color: #64748B;
      flex: 0 0 auto;
      padding: 10px 14px;
    }
    #btn-clear-keyterms:hover {
      color: #E94560;
    }
    #keyterm-list {
      margin-top: 8px;
      max-height: 160px;
      overflow-y: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    #keyterm-list::-webkit-scrollbar {
      width: 4px;
    }
    #keyterm-list::-webkit-scrollbar-thumb {
      background: #1E293B;
      border-radius: 2px;
    }
    .keyterm-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      background: #1E293B;
      color: #94A3B8;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
    }
    .keyterm-tag.base {
      color: #64748B;
    }
    .keyterm-tag.custom {
      color: #22D3EE;
    }
    .keyterm-tag .keyterm-remove {
      cursor: pointer;
      margin-left: 4px;
      opacity: 0.5;
    }
    .keyterm-tag .keyterm-remove:hover {
      opacity: 1;
      color: #E94560;
    }
  </style>
</head>
<body>
  <div class="logo">
    <span class="logo-icon">📺</span>
    <h1>Niko Jikkyo</h1>
    <span class="version">v0.17.0</span>
  </div>

  <div class="section-label">Connection</div>

  <div class="field">
    <label>チャンネルID / 番組ID</label>
    <input type="text" id="channel-id" placeholder="ch2650071 または lv...">
  </div>

  <div class="buttons">
    <button id="btn-connect">接続</button>
    <button id="btn-disconnect" disabled>切断</button>
  </div>

  <div id="status" class="status disconnected">未接続</div>

  <hr class="divider">

  <div class="section-label">AI Settings</div>

  <div class="field">
    <label>Gemini API Key</label>
    <input type="text" id="gemini-api-key" placeholder="AIzaSy...">
    <div class="hint">
      <a href="https://aistudio.google.com/api-keys" target="_blank">Google AI Studio</a> で取得（無料枠あり）
    </div>
  </div>
  <div class="buttons">
    <button id="btn-save-key">保存</button>
  </div>
  <div id="key-status"></div>

  <hr class="divider">

  <div class="section-label">Voice Settings</div>

  <div class="field">
    <label>Deepgram API Key</label>
    <input type="text" id="deepgram-api-key" placeholder="Token...">
    <div class="hint">
      <a href="https://console.deepgram.com/" target="_blank">Deepgram Console</a> で取得（従量課金）
    </div>
  </div>
  <div class="buttons">
    <button id="btn-save-dg-key">保存</button>
  </div>
  <div id="dg-key-status"></div>

  <div class="field" style="margin-top: 14px;">
    <label>音声認識キーワード（選手名を自動取得）</label>
    <div style="display: flex; gap: 8px;">
      <input type="text" id="team-a" placeholder="チーム名（例: 日本）" style="flex:1;">
      <input type="text" id="team-b" placeholder="チーム名（例: アメリカ）" style="flex:1;">
    </div>
    <div class="hint">対戦する2チームを入力して選手名をAIで取得</div>
  </div>
  <div class="buttons">
    <button id="btn-fetch-keyterms">選手取得</button>
    <button id="btn-clear-keyterms" style="display:none;">クリア</button>
  </div>
  <div id="keyterm-status"></div>
  <div class="field" style="margin-top: 8px;">
    <div style="display: flex; gap: 6px;">
      <input type="text" id="custom-keyterm" placeholder="キーワードを追加（例: ピッチャー）">
      <button id="btn-add-keyterm" style="flex:0 0 auto; padding:10px 14px;">追加</button>
    </div>
  </div>
  <div id="keyterm-list"></div>

  <script src="popup.js"></script>
</body>
</html>
